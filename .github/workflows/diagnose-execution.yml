name: Diagnose n8n Execution

on:
  workflow_dispatch:
    inputs:
      execution-json:
        description: 'JSON from a failed n8n execution (paste full execution object)'
        required: true
        type: string

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose execution
        uses: ./
        with:
          command: 'explain'
          execution-json: ${{ inputs.execution-json }}
          output-format: 'markdown'
          post-comment: 'false'
